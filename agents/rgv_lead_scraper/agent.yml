name: RGV Lead Scraper
model: gpt-5.2
welcome_text: "Lead-scraper agent ready. Which city and category should we search?"
instructions_file: instructions.md
# build_skills_context discovers skill bundles under .omni_code/skills/ and injects
# their name+description index into instructions.md via {{ available_skills_block }}.
# Skills are higher-level recipes that compose the tools below — they add NO new tools
# and NO new permissions. See .omni_code/skills/SCHEMA.md for the descriptor schema and
# instructions.md ("Skills") for selection rules.
context: build_skills_context
tools:
  - request_lead_generation
  - list_lead_candidates
  - promote_lead_candidates
  - get_settings_summary
  - read_file
  - list_directory
use_safe_agent: true
safe_agent_options:
  # Everything in this list auto-approves transparently.
  # request_lead_generation and promote_lead_candidates are intentionally
  # EXCLUDED — they mutate CRM data (and the former also burns SerpAPI
  # budget), so each call goes through ui.request_tool_approval.
  safe_tool_names:
    - get_settings_summary
    - list_lead_candidates
    - read_file
    - list_directory
